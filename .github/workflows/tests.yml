name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Python 3.8 and 3.9 are no longer installable on ubuntu-latest
        # (ubuntu-24.04), so pin those to ubuntu-22.04 which still provides them.
        include:
          - python-version: "3.8"
            os: ubuntu-22.04
          - python-version: "3.9"
            os: ubuntu-22.04
          - python-version: "3.10"
            os: ubuntu-latest
          - python-version: "3.11"
            os: ubuntu-latest
          - python-version: "3.12"
            os: ubuntu-latest
          - python-version: "3.13"
            os: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run test suite
        run: python3 tests/run_tests.py

  coverage:
    name: Coverage (100% required)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coverage
        run: pip install coverage

      - name: Run tests with coverage
        run: coverage run --source=core,agents/claude-code/hooks_scripts tests/run_tests.py

      - name: Enforce 100% coverage
        run: coverage report --show-missing --fail-under=100
